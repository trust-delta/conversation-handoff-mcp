# Dependabot configuration — automated dependency currency.
# See: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm dependencies. Minor/patch are grouped into a single PR to cut noise;
  # majors stay ungrouped so each breaking bump gets its own reviewable PR.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep GitHub Actions (ci.yml / publish.yml) pinned versions current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
